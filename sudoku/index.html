<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoobV2 Mini Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="top">
      <div>
        <p class="eyebrow">NoobV2 Mini Games</p>
        <h1 id="title">Choose a minigame</h1>
        <p id="info">Pick one game to play.</p>
      </div>

      <div class="timer-card">
        <span>Time</span>
        <strong id="timer">0m 0s</strong>
      </div>
    </section>

    <section id="homePage" class="page">
      <a class="game-card" id="sudokuLink">
        <strong>Sudoku</strong>
        <span>Complete the board</span>
      </a>

      <a class="game-card" id="hangmanLink">
        <strong>Hangman</strong>
        <span>Guess the hard word</span>
      </a>

      <a class="game-card" id="crosswordLink">
        <strong>Crossword</strong>
        <span>Find 10 hidden words</span>
      </a>
    </section>

    <section id="gamePage" class="page hidden">
      <div class="toolbar">
        <button id="homeBtn">Home</button>

        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <button id="newGame">New Game</button>
      </div>

      <section class="stats">
        <div>
          <span>Game</span>
          <strong id="gameText">-</strong>
        </div>
        <div>
          <span>Difficulty</span>
          <strong id="difficultyText">Easy</strong>
        </div>
        <div>
          <span>Mistakes</span>
          <strong id="mistakesText">0</strong>
        </div>
      </section>

      <section id="sudokuUI" class="game-ui hidden">
        <div id="board"></div>

        <div class="numbers">
          <button>1</button><button>2</button><button>3</button>
          <button>4</button><button>5</button><button>6</button>
          <button>7</button><button>8</button><button>9</button>
        </div>

        <div class="actions">
          <button id="erase">Erase</button>
          <button id="submitSudoku">Submit Result</button>
        </div>
      </section>

      <section id="hangmanUI" class="game-ui hidden">
        <div class="word-box">
          <h2 id="hangmanWord"></h2>
          <p id="hangmanHint"></p>
          <p id="wrongLetters"></p>
        </div>

        <div id="letterButtons" class="letters"></div>
      </section>

      <section id="crosswordUI" class="game-ui hidden">
        <p class="small-text">Find the words in the grid, then tick them below.</p>

        <div id="crosswordGrid"></div>

        <div id="wordList"></div>

        <button id="checkCrossword">Check Crossword</button>
      </section>

      <p id="status"></p>
    </section>
  </main>

  <script src="puzzles.js"></script>
  <script src="script.js"></script>
</body>
</html>
